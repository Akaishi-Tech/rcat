name: Feature request
description: Suggest an idea or improvement for rcat
title: "feat: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: A short description of the use case, not the proposed solution.
    validations: { required: true }
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like rcat to behave?
    validations: { required: false }
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations: { required: false }
